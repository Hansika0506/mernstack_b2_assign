<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drawing Scene</title>
  <link rel="stylesheet" href="drawing.css" />
</head>
<body>
  <div class="scene">
    <div class="sun"></div>

    <!-- Mountains -->
    <div class="mountain m1"></div>
    <div class="mountain m2"></div>
    <div class="mountain m3"></div>

    <!-- River -->
    <div class="river"></div>

    <!-- House -->
    <div class="house">
      <div class="roof"></div>
      <div class="walls">
        <div class="window"></div>
        <div class="door"></div>
      </div>
    </div>

    <!-- Tree -->
    <div class="tree">
      <div class="leaves"></div>
      <div class="trunk"></div>
    </div>

    <!-- Bush -->
    <div class="bush"></div>

    <!-- Road -->
    <div class="road"></div>
  </div>
</body>
</html>
